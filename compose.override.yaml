###> Overrides de DESARROLLO ─────────────────────────────────────────────────
# Este fichero se carga automáticamente por Docker Compose en desarrollo.
# En producción NO debe existir (o renombrarlo).
#
# En desarrollo solo se arranca la base de datos; la aplicación PHP
# se sirve con:  symfony server:start
##############################################################################

services:

  # En desarrollo el servicio app está deshabilitado (usa Symfony CLI).
  # Para arrancarlo igualmente: docker compose --profile production up -d
  app:
    profiles:
      - production

  database:
    ports:
      - "5432:5432"
