name: Build binarios embebidos

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versión del build (p.ej. 1.2.3)"
        required: true
        default: "dev"

env:
  FRANKENPHP_VERSION: "1.4.4"
  PHP_VERSION: "8.4"

# ── Job 1: compilar la aplicación PHP ────────────────────────────────────────
jobs:
  build-app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_sqlite, zip, mbstring, ctype, dom, iconv, libxml
          coverage: none

      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependencias PHP (producción)
        run: |
          composer install \
            --no-dev \
            --prefer-dist \
            --no-scripts \
            --no-autoloader \
            --no-interaction
          composer dump-autoload \
            --optimize \
            --no-dev \
            --classmap-authoritative

      - name: Compilar assets
        env:
          APP_ENV: prod
          APP_DEBUG: "0"
          DATABASE_URL: "sqlite:////tmp/ci-build.db"
          APP_SECRET: "ci-placeholder-secret-0000000000000000"
          MIGRATIONS_PATH: "migrations/sqlite"
        run: |
          php bin/console importmap:install
          php bin/console tailwind:build --minify
          php bin/console asset-map:compile

      - name: Preparar bundle para embedding
        run: |
          mkdir -p embed-app
          cp -r \
            bin config migrations public src templates translations vendor \
            importmap.php symfony.lock \
            embed-app/
          # Caddyfile embebido con NEXO_EMBEDDED=1 y puerto 8180
          cp dist/Caddyfile.embed embed-app/Caddyfile
          # El directorio var/ se genera en tiempo de ejecución (ver Kernel::getCacheDir)

      - uses: actions/upload-artifact@v4
        with:
          name: embed-app-bundle
          path: embed-app
          retention-days: 1

# ── Job 2: binarios Linux (via Docker static-builder) ────────────────────────
  build-linux:
    needs: build-app
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
            output: frankenphp-linux-x86_64
            artifact: nexo-fp-linux-x86_64
          - arch: aarch64
            platform: linux/arm64
            output: frankenphp-linux-aarch64
            artifact: nexo-fp-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: embed-app-bundle
          path: embed-app

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Compilar binario embebido (${{ matrix.arch }})
        run: |
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --file dist/Dockerfile.embed.linux \
            --load \
            --tag nexo-embed-${{ matrix.arch }} \
            .

          CID=$(docker create "nexo-embed-${{ matrix.arch }}")
          docker cp "${CID}:/go/src/app/dist/${{ matrix.output }}" nexo-fp
          docker rm "${CID}"
          chmod +x nexo-fp

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: nexo-fp

# ── Job 3: binario Windows (cross-compile desde Linux) ───────────────────────
  build-windows:
    needs: build-app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: embed-app-bundle
          path: embed-app

      - uses: docker/setup-buildx-action@v3

      - name: Compilar binario embebido (Windows x86_64)
        run: |
          # El static-builder-gnu incluye mingw-w64 para cross-compile a Windows
          cat > /tmp/Dockerfile.embed.windows << 'EOF'
          FROM dunglas/frankenphp:static-builder-gnu
          WORKDIR /go/src/app/dist/app
          COPY embed-app/ .
          WORKDIR /go/src/app/
          RUN EMBED=dist/app/ GOOS=windows GOARCH=amd64 ./build-static.sh
          EOF

          docker build \
            --platform linux/amd64 \
            --file /tmp/Dockerfile.embed.windows \
            --tag nexo-embed-windows \
            .

          CID=$(docker create nexo-embed-windows)
          docker cp "${CID}:/go/src/app/dist/frankenphp-windows-x86_64.exe" nexo-fp.exe
          docker rm "${CID}"

      - uses: actions/upload-artifact@v4
        with:
          name: nexo-fp-windows-x86_64
          path: nexo-fp.exe

# ── Job 4: binarios macOS (runners nativos) ───────────────────────────────────
  build-macos:
    needs: build-app

    strategy:
      matrix:
        include:
          - arch: arm64
            runs-on: macos-latest     # Apple Silicon
            artifact: nexo-fp-macos-arm64
          - arch: x86_64
            runs-on: macos-13         # Intel
            artifact: nexo-fp-macos-x86_64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: embed-app-bundle
          path: embed-app

      - name: Instalar dependencias de compilación
        run: |
          brew install go brotli libiconv pkgconf
          # pkgconf instala el binario "pkgconf" pero no siempre crea el symlink
          # "pkg-config" que static-php-cli busca con `which pkg-config`.
          BREW_PREFIX="$(brew --prefix)"
          ln -sf "${BREW_PREFIX}/bin/pkgconf" "${BREW_PREFIX}/bin/pkg-config"
          echo "${BREW_PREFIX}/bin" >> "$GITHUB_PATH"

      - name: Clonar FrankenPHP v${{ env.FRANKENPHP_VERSION }}
        run: |
          git clone --depth=1 \
            --branch "v${{ env.FRANKENPHP_VERSION }}" \
            https://github.com/dunglas/frankenphp \
            /tmp/frankenphp

      - name: Copiar bundle al árbol de FrankenPHP
        run: |
          mkdir -p /tmp/frankenphp/dist/app
          cp -r embed-app/. /tmp/frankenphp/dist/app/

      - name: Compilar binario embebido (macOS ${{ matrix.arch }})
        run: |
          which pkg-config  # confirmar que está en PATH antes de compilar
          cd /tmp/frankenphp
          EMBED=dist/app/ ./build-static.sh

      - name: Copiar binario resultante
        run: |
          # El nombre exacto varía según arquitectura y versión del script
          BINARY=$(find /tmp/frankenphp/dist/ -maxdepth 1 -type f \
            \( -name "frankenphp-mac-*" -o -name "frankenphp-darwin-*" \) \
            ! -name "*.exe" | head -1)
          cp "$BINARY" nexo-fp
          chmod +x nexo-fp

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: nexo-fp

# ── Job 5: publicar GitHub Release (solo tags) ───────────────────────────────
  release:
    if: github.ref_type == 'tag'
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4
        with:
          pattern: nexo-fp-*
          merge-multiple: false

      - name: Preparar binarios para la release
        run: |
          VERSION="${{ github.ref_name }}"

          for ARCH in linux-x86_64 linux-aarch64 macos-arm64 macos-x86_64; do
            SRC="nexo-fp-${ARCH}/nexo-fp"
            DST="nexo-fp-${VERSION}-${ARCH}"
            mv "$SRC" "$DST"
            chmod +x "$DST"
          done

          mv "nexo-fp-windows-x86_64/nexo-fp.exe" \
             "nexo-fp-${VERSION}-windows-x86_64.exe"

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nexo-fp-*-linux-x86_64
            nexo-fp-*-linux-aarch64
            nexo-fp-*-macos-arm64
            nexo-fp-*-macos-x86_64
            nexo-fp-*-windows-x86_64.exe
          generate_release_notes: true
          body: |
            ## Instalación

            Descarga el binario para tu plataforma y ejecútalo directamente — no necesitas instalar nada más.

            | Plataforma | Fichero |
            |---|---|
            | Linux x86_64 | `nexo-fp-${{ github.ref_name }}-linux-x86_64` |
            | Linux ARM64 | `nexo-fp-${{ github.ref_name }}-linux-aarch64` |
            | macOS Apple Silicon | `nexo-fp-${{ github.ref_name }}-macos-arm64` |
            | macOS Intel | `nexo-fp-${{ github.ref_name }}-macos-x86_64` |
            | Windows x86_64 | `nexo-fp-${{ github.ref_name }}-windows-x86_64.exe` |

            ### Linux / macOS
            ```bash
            chmod +x nexo-fp-*
            # macOS: eliminar cuarentena de Gatekeeper
            xattr -d com.apple.quarantine ./nexo-fp-* 2>/dev/null || true
            ./nexo-fp-*
            ```

            ### Windows
            ```powershell
            .\nexo-fp-*-windows-x86_64.exe
            ```

            La aplicación queda disponible en **http://localhost:8180** y en la dirección IP local del equipo.
            Los datos se guardan en el directorio `data/` creado junto al binario.
            Para cambiar el puerto, crea un fichero `Caddyfile` en el mismo directorio.
