framework:
    rate_limiter:
        # Solicitudes de recuperación de contraseña (por IP)
        password_reset:
            policy: fixed_window
            limit: 5
            interval: '15 minutes'
        # Búsqueda global ⌘K (por usuario)
        search:
            policy: sliding_window
            limit: 60
            interval: '1 minute'

when@test:
    framework:
        rate_limiter:
            password_reset:
                policy: fixed_window
                limit: 1000
                interval: '15 minutes'
            search:
                policy: sliding_window
                limit: 1000
                interval: '1 minute'
